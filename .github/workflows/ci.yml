name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  native-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - uses: gradle/actions/wrapper-validation@v4
      - name: Compute version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          # Get the most recent tag matching v* (skip the rolling "latest" tag)
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v '^latest$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.1.0"
            COMMITS_SINCE="$VERSION_CODE"
          else
            COMMITS_SINCE=$(git rev-list --count ${LATEST_TAG}..HEAD 2>/dev/null || echo "0")
          fi
          TAG_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          if [ "$COMMITS_SINCE" -gt 0 ]; then
            VERSION_NAME="${TAG_VERSION}.dev${COMMITS_SINCE}"
          else
            VERSION_NAME="$TAG_VERSION"
          fi
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "versionCode=$VERSION_CODE  versionName=$VERSION_NAME"
      - run: ./native-android/gradlew -p native-android -PversionCode="$VERSION_CODE" -PversionName="$VERSION_NAME" spotlessCheck lintDebug testDebugUnitTest assembleDebug assembleDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-chat-native-preview
          path: native-android/app/build/outputs/apk/debug/app-debug.apk

  native-android-release:
    runs-on: ubuntu-latest
    needs: native-android
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Compute version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          # Get the most recent tag matching v* (skip the rolling "latest" tag)
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v '^latest$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.1.0"
            COMMITS_SINCE="$VERSION_CODE"
          else
            COMMITS_SINCE=$(git rev-list --count ${LATEST_TAG}..HEAD 2>/dev/null || echo "0")
          fi
          TAG_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          if [ "$COMMITS_SINCE" -gt 0 ]; then
            VERSION_NAME="${TAG_VERSION}.dev${COMMITS_SINCE}"
          else
            VERSION_NAME="$TAG_VERSION"
          fi
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "versionCode=$VERSION_CODE  versionName=$VERSION_NAME"
      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > native-android/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../upload-keystore.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > native-android/key.properties
      - run: ./native-android/gradlew -p native-android -PversionCode="$VERSION_CODE" -PversionName="$VERSION_NAME" assembleRelease
      - name: Prepare stable APK filename
        run: cp native-android/app/build/outputs/apk/release/app-release.apk hermes-chat-latest.apk
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-chat-android
          path: hermes-chat-latest.apk

  publish-android:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [native-android-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: hermes-chat-android
      - uses: actions/download-artifact@v4
        with:
          name: hermes-chat-native-preview
          path: native-preview
      - name: Compute version for release notes
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          # Get the most recent tag matching v* (skip the rolling "latest" tag)
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v '^latest$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.1.0"
            COMMITS_SINCE="$VERSION_CODE"
          else
            COMMITS_SINCE=$(git rev-list --count ${LATEST_TAG}..HEAD 2>/dev/null || echo "0")
          fi
          TAG_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          if [ "$COMMITS_SINCE" -gt 0 ]; then
            VERSION_NAME="${TAG_VERSION}.dev${COMMITS_SINCE}"
          else
            VERSION_NAME="$TAG_VERSION"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
      - name: Prepare native preview APK
        run: cp native-preview/app-debug.apk hermes-chat-native-preview.apk
      - name: Publish latest APKs at the stable download URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Automated signed Android build ${VERSION_NAME} (versionCode ${VERSION_CODE}) from commit ${GITHUB_SHA}."
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest hermes-chat-latest.apk hermes-chat-native-preview.apk \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest Hermes Chat APK" \
              --notes "$notes" \
              --latest
          else
            gh release create latest hermes-chat-latest.apk hermes-chat-native-preview.apk \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Latest Hermes Chat APK" \
              --notes "$notes" \
              --latest
          fi
