name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  native-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - uses: gradle/actions/wrapper-validation@v4
      - run: ./native-android/gradlew -p native-android spotlessCheck lintDebug testDebugUnitTest assembleDebug assembleDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-chat-native-preview
          path: native-android/app/build/outputs/apk/debug/app-debug.apk

  linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-chat-linux
          path: build/linux/x64/release/bundle

  android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > android/key.properties
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Prepare stable APK filename
        run: cp build/app/outputs/flutter-apk/app-release.apk hermes-chat-latest.apk
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-chat-android
          path: hermes-chat-latest.apk

  publish-android:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [android, native-android]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hermes-chat-android
      - uses: actions/download-artifact@v4
        with:
          name: hermes-chat-native-preview
          path: native-preview
      - name: Prepare native preview APK
        run: cp native-preview/app-debug.apk hermes-chat-native-preview.apk
      - name: Publish latest APKs at the stable download URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Automated signed Android build from commit ${GITHUB_SHA}."
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest hermes-chat-latest.apk hermes-chat-native-preview.apk \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest Hermes Chat APK" \
              --notes "$notes" \
              --latest
          else
            gh release create latest hermes-chat-latest.apk hermes-chat-native-preview.apk \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Latest Hermes Chat APK" \
              --notes "$notes" \
              --latest
          fi
